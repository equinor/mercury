name: "Linting and checks"
on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    name: "Linting and checks: ${{ matrix.title }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - title: "Pre-commit with prek"
            task: lint-pre-commit
          - title: "mypy type check"
            task: lint-mypy
          - title: "Typescript compilation"
            task: lint-typescript-compilation
    steps:
      - name: "Setup: Checkout repository"
        uses: actions/checkout@v6

      - name: "Setup: install mise"
        uses: jdx/mise-action@v4

      - name: "Run: ${{ matrix.title }}"
        run: mise run ${{ matrix.task }}
