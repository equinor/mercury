name: "Tests"
on:
  workflow_call:
    secrets:
      LIBHG_PAT:
        description: "PAT for accessing libhg repository"
        required: true

permissions:
  contents: read
  packages: read

env:
  API_IMAGE: ghcr.io/equinor/mercury-api

jobs:
  test-api:
    runs-on: ubuntu-latest
    name: "Tests: API"
    steps:
      - name: "Setup: Checkout repository"
        uses: actions/checkout@v6

      - name: "Setup: Login to image registry"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Setup: set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Setup: Build API test image"
        uses: docker/build-push-action@v6
        with:
          context: ./api
          target: development
          load: true
          tags: mercury-api-ci
          cache-from: type=registry,ref=${{ env.API_IMAGE }}:latest
          build-args: |
            LIBHG_VERSION=${{ vars.LIBHG_VERSION }}
          secrets: |
            libhg-pat=${{ secrets.LIBHG_PAT }}

      - name: "Run: Unit tests with python"
        run: docker compose -f compose.yml -f compose.ci.yml run --rm api uv run pytest -m unit

      - name: "Run: Integration tests with python"
        run: docker compose -f compose.yml -f compose.ci.yml run --rm api uv run pytest -m integration

  test-web:
    runs-on: ubuntu-latest
    name: "Tests: Web"
    steps:
      - name: "Setup: Checkout repository"
        uses: actions/checkout@v6
        with:
          sparse-checkout: web

      - name: "Setup: Install node"
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: web/yarn.lock

      - name: "Setup: Install node dependencies"
        run: yarn install --frozen-lockfile
        working-directory: web

      - name: "Run: Tests with yarn"
        run: yarn test
        working-directory: web
