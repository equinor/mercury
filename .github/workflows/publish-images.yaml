name: "Publish container images"
on:
  workflow_call:
    inputs:
      image-tags:
        description: "Which tag to give the images. Supports multiple tags if comma separated, ie 'tag1,tag2'"
        required: true
        type: string
      applicationinsights-connection-string:
        description: "Connection string for Application Insights"
        type: string
        required: true
    secrets:
      LIBHG_PAT:
        description: "PAT for accessing libhg repository"
        required: true

permissions:
  contents: read
  packages: write

env:
  AZURE_CLIENT_ID: 0cd10735-a40c-4ff6-84c8-74e3b54ed93f
  AZURE_TENANT_ID: 3aa4a235-b6e2-48d5-9195-7fcf05b459b0
  OAUTH_AUTH_SCOPE: api://0cd10735-a40c-4ff6-84c8-74e3b54ed93f/api
  NGINX_IMAGE: ghcr.io/equinor/mercury-nginx
  API_IMAGE: ghcr.io/equinor/mercury-api

jobs:
  build-and-publish-nginx:
    runs-on: ubuntu-latest
    steps:
      - name: "Setup: check out repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          fetch-tags: true

      - name: "Setup: login to image registry"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Setup: set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Setup: get version info"
        id: version
        run: |
          echo "hash=$(git log -n 1 --format=format:'%h')" >> $GITHUB_OUTPUT
          echo "date=$(git log -n 1 --format=format:'%cs')" >> $GITHUB_OUTPUT
          VERSION=$(git describe --tags --exact-match 2>/dev/null || echo "")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: "Setup: write version file"
        run: |
          printf "hash: ${{ steps.version.outputs.hash }}\ndate: ${{ steps.version.outputs.date }}\nrefs: ${{ steps.version.outputs.version }}" > ./web/public/version.txt

      - name: "Setup: generate image tags"
        id: tags
        run: |
          TAGS=$(echo "${{ inputs.image-tags }}" | tr ',' '\n' | sed "s|.*|${{ env.NGINX_IMAGE }}:&|")
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: "Run: build and publish nginx"
        uses: docker/build-push-action@v6
        with:
          context: ./web
          target: nginx-prod
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=registry,ref=${{ env.NGINX_IMAGE }}:latest
          cache-to: type=inline
          build-args: |
            AUTH_ENABLED=1
            AZURE_CLIENT_ID=${{ env.AZURE_CLIENT_ID }}
            AZURE_TENANT_ID=${{ env.AZURE_TENANT_ID }}
            OAUTH_AUTH_SCOPE=${{ env.OAUTH_AUTH_SCOPE }}
            APPLICATIONINSIGHTS_CONNECTION_STRING=${{ inputs.applicationinsights-connection-string }}

  build-and-publish-api:
    runs-on: ubuntu-latest
    steps:
      - name: "Setup: check out repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          fetch-tags: true

      - name: "Setup: login to image registry"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Setup: set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Setup: get version info"
        id: version
        run: |
          echo "hash=$(git log -n 1 --format=format:'%h')" >> $GITHUB_OUTPUT
          echo "date=$(git log -n 1 --format=format:'%cs')" >> $GITHUB_OUTPUT
          VERSION=$(git describe --tags --exact-match 2>/dev/null || echo "")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: "Setup: write version file"
        run: |
          printf "hash: ${{ steps.version.outputs.hash }}\ndate: ${{ steps.version.outputs.date }}\nrefs: ${{ steps.version.outputs.version }}" > ./api/src/version.txt

      - name: "Setup: generate image tags"
        id: tags
        run: |
          TAGS=$(echo "${{ inputs.image-tags }}" | tr ',' '\n' | sed "s|.*|${{ env.API_IMAGE }}:&|")
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: "Run: build and publish API"
        uses: docker/build-push-action@v6
        with:
          context: ./api
          target: prod
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=registry,ref=${{ env.API_IMAGE }}:latest
          cache-to: type=inline
          build-args: |
            LIBHG_VERSION=${{ vars.LIBHG_VERSION }}
          secrets: |
            libhg-pat=${{ secrets.LIBHG_PAT }}
